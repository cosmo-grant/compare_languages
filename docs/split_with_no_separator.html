<!doctype html>
<html lang="en-UK">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>split with no separator | Compare Languages</title>
    <meta name="author" content="Cosmo Grant" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="hljs-theme.css" />
  </head>

  <body>
    <main>
      <a href="index.html" class="back-link" aria-label="Back to index">&larr;</a>
      <h1>split with no separator</h1>

      <div id="tab-buttons">
      
        <button>node</button>
      
        <button>python</button>
      
      </div>

      <div id="snippet-container">
        
        <div hidden>
          <pre><code class="lang-javascript">const s = "rayo mcgee yablo"
console.log(s.split())
</code></pre>
          <div class="output-section">
            <button class="output-toggle">output</button>
            <pre class="output-hidden"><samp>[ 'rayo mcgee yablo' ]
</samp></pre>
          </div>
        </div>
        
        <div hidden>
          <pre><code class="lang-python">s = "rayo mcgee yablo"
print(s.split())
</code></pre>
          <div class="output-section">
            <button class="output-toggle">output</button>
            <pre class="output-hidden"><samp>['rayo', 'mcgee', 'yablo']
</samp></pre>
          </div>
        </div>
        
      </div>

      <div id="discussion">
        Surely Python is the sensible one here.

      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="comparison.js"></script>
  </body>
</html>
