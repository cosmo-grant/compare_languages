  <body>
    <h1>split with no separator</h1>

    <div id="tab-buttons">
    
      <button>node</button>
    
      <button>python</button>
    
    </div>

    <div id="snippet-container">
      
      <div>
        <pre><code class="lang-javascript">const s = "rayo mcgee yablo"
console.log(s.split())
</code></pre>
      </div>
      
      <div>
        <pre><code class="lang-python">s = "rayo mcgee yablo"
print(s.split())
</code></pre>
      </div>
      
    </div>

    <button id="toggle-output-button">toggle output</button>

    <div id="output-container">
      
      <div>
        <pre><samp>[ 'rayo mcgee yablo' ]
</samp></pre>
      </div>
      
      <div>
        <pre><samp>['rayo', 'mcgee', 'yablo']
</samp></pre>
      </div>
      
    </div>

    <div id="discussion">
      Surely python is the sensible one here.

    </div>
