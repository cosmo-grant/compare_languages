  <body>
    <main>
      <a href="index.html" class="back-link" aria-label="Back to index">&larr;</a>
      <h1>function call as function argument</h1>

      <div id="tab-buttons">
      
        <button>node</button>
      
        <button>python</button>
      
      </div>

      <div id="snippet-container">
        
        <div>
          <pre><code class="lang-javascript">function foo() {
  console.log("here")
  return 0
}

function bar(x = foo()) {
  console.log(x)
}

bar()
bar(1)
bar()

</code></pre>
          <div class="output-section">
            <button class="output-toggle">output</button>
            <pre><samp>here
0
1
here
0
</samp></pre>
          </div>
        </div>
        
        <div>
          <pre><code class="lang-python">def foo():
    print("here")
    return 0

def bar(x=foo()):
    print(x)

bar()
bar(1)
bar()

</code></pre>
          <div class="output-section">
            <button class="output-toggle">output</button>
            <pre><samp>here
0
1
0
</samp></pre>
          </div>
        </div>
        
      </div>
