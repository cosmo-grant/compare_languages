      <div>
        <pre><code class="lang-javascript">function foo() {
  console.log("here")
  return 0
}

function bar(x = foo()) {
  console.log(x)
}

bar()
bar(1)
bar()

</code></pre>

        <pre><code class="lang-python">def foo():

bar()
bar(1)
bar()

</code></pre>

    </div>
