<html lang="en-UK">
  <head>
    <meta charset="utf-8" />

  <body>
    <main>
      <a href="index.html" class="back-link" aria-label="Back to index">&larr;</a>
      <h1>mutable default arguments</h1>

      <div id="tab-buttons">
      
        <button>node</button>
      
        <button>python</button>
      
      </div>

      <div id="snippet-container">
        
        <div hidden>
          <pre><code class="lang-javascript">function foo(x = []) {
  x.push(1);
  console.log(x);
}

foo()
foo()
</code></pre>
          <div class="output-section">
            <button class="output-toggle">output</button>
            <pre class="output-hidden"><samp>[ 1 ]
[ 1 ]
</samp></pre>
          </div>
        </div>
        
        <div hidden>
          <pre><code class="lang-python">def foo(x=[]):
    x.append(1)
    print(x)

foo()
foo()
</code></pre>
          <div class="output-section">
            <button class="output-toggle">output</button>
            <pre class="output-hidden"><samp>[1]
[1, 1]
</samp></pre>
          </div>
        </div>
        
      </div>

      <div id="discussion">
        evaluated once, at definition time evaluated per call

      </div>
    </main>
