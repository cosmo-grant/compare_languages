<!doctype html>
<html lang="en-UK">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mutable default arguments | Compare Languages</title>
    <meta name="author" content="Cosmo Grant" />
  </head>

  <body>
    <h1>mutable default arguments</h1>

    <div id="tab-buttons">
    
      <button>node</button>
    
      <button>python</button>
    
    </div>

    <div id="snippet-container">
      
      <div>
        <pre><code class="lang-javascript">function foo(x = []) {
  x.push(1);
  console.log(x);
}

foo()
foo()
</code></pre>
      </div>
      
      <div>
        <pre><code class="lang-python">def foo(x=[]):
    x.append(1)
    print(x)

foo()
foo()
</code></pre>
      </div>
      
    </div>

    <button id="toggle-output-button">toggle output</button>

    <div id="output-container">
      
      <div>
        <pre><samp>[ 1 ]
[ 1 ]
</samp></pre>
      </div>
      
      <div>
        <pre><samp>[1]
[1, 1]
</samp></pre>
      </div>
      
    </div>

    <div id="discussion">
      evaluated once, at definition time evaluated per call

    </div>

    <link rel="stylesheet" href="hljs-theme.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="comparison.js"></script>
  </body>
</html>
